name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: 构建 & 发布产物
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      - name: 类型检查
        run: npm run typecheck

      - name: 构建 dist
        run: npm run build

      - name: 生成文档
        run: npm run docs
        continue-on-error: true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

      - name: 上传文档
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/
          retention-days: 30
        continue-on-error: true
